ba(255,255,255,0.2);\">30 páginas<\u002Fspan>\n<span class=\"tag\" style=\"color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.2);\">Se guarda solo<\u002Fspan>\n<span class=\"tag\" style=\"color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.2);\">Exportable a PDF<\u002Fspan>\n<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"position:absolute;bottom:38px;left:58px;z-index:1;display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,255,255,0.4);\">\n<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(255,255,255,0.4)\" stroke-width=\"1.5\" style=\"width:15px;height:15px;\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\nTus respuestas nunca salen de tu dispositivo.\n<\u002Fdiv>\n<div style=\"position:absolute;bottom:38px;right:58px;z-index:1;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);\">Shivalink<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 02 · CÓMO USAR -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Empezamos · 02<\u002Fdiv>\n<h2>Cómo usar este cuaderno.<\u002Fh2>\n<p style=\"margin-bottom:18px;max-width:600px;\">No es para leer. Es para rellenar. Al terminar la clase tendrás el calendario de tu primer lanzamiento, día a día.<\u002Fp>\n<div class=\"editbanner\" style=\"margin-bottom:24px;\">✏️ Editable: escribe directamente en las líneas y cajas. Se guarda solo en este navegador.<\u002Fdiv>\n<div class=\"row3\" style=\"margin-bottom:8px;\">\n<div class=\"card\"><div class=\"emoji\">✍️<\u002Fdiv><h3 style=\"margin-top:12px;\">Escribe<\u002Fh3><p style=\"font-size:14.5px;\">Rellena cada ejercicio en directo, mientras avanzamos.<\u002Fp><\u002Fdiv>\n<div class=\"card\"><div class=\"emoji\">💾<\u002Fdiv><h3 style=\"margin-top:12px;\">Se guarda solo<\u002Fh3><p style=\"font-size:14.5px;\">Tus respuestas quedan aunque cierres la página.<\u002Fp><\u002Fdiv>\n<div class=\"card\"><div class=\"emoji\">📄<\u002Fdiv><h3 style=\"margin-top:12px;\">Expórtalo<\u002Fh3><p style=\"font-size:14.5px;\">Botón abajo a la derecha: guarda tu cuaderno en PDF.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"line\"><\u002Fdiv>\n<h4>Una promesa antes de empezar<\u002Fh4>\n<p style=\"max-width:620px;margin-bottom:18px;\">Si rellenas las 30 páginas, sales de hoy con la fórmula completa de un lanzamiento de 14 días. La misma que mueve 8,6 M €.<\u002Fp>\n<div class=\"ex\" style=\"display:flex;gap:14px;align-items:center;\">\n<div class=\"exface\" style=\"width:42px;height:42px;font-size:18px;\">M<\u002Fdiv>\n<div><div class=\"exhead\" style=\"margin-bottom:3px;\">Te acompaña un ejemplo real<\u002Fdiv><p><strong>Marta · nutricionista · 78 mil seguidores.<\u002Fstrong> Ayer montaste su producto. Hoy lo lanzamos juntos, día a día.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">02<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 03 · LO QUE TE LLEVAS -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Lo que te llevas hoy · 03<\u002Fdiv>\n<h2>De tener un producto a saber venderlo.<\u002Fh2>\n<p style=\"margin-bottom:24px;max-width:620px;\">Ayer creaste el producto. Hoy aprendes la parte que nadie ve: cómo se vende. Tres cosas te llevas:<\u002Fp>\n<div class=\"row3\" style=\"margin-bottom:22px;\">\n<div class=\"card\"><div class=\"emoji\">🗺️<\u002Fdiv><h4 style=\"margin-top:12px;\">El mapa<\u002Fh4><h3>3 fases<\u002Fh3><p style=\"font-size:14px;\">Todo lanzamiento, siempre.<\u002Fp><\u002Fdiv>\n<div class=\"cardb\"><div class=\"emoji\">🗓️<\u002Fdiv><h4 style=\"margin-top:12px;\">El calendario<\u002Fh4><h3>14 días<\u002Fh3><p style=\"font-size:14px;\">Qué se publica cada día y por qué.<\u002Fp><\u002Fdiv>\n<div class=\"card\"><div class=\"emoji\">🧠<\u002Fdiv><h4 style=\"margin-top:12px;\">La psicología<\u002Fh4><h3>11 botones<\u002Fh3><p style=\"font-size:14px;\">Los que nos hacen comprar a todos.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"carddark\" style=\"display:flex;gap:20px;align-items:center;\">\n<div class=\"emojibig\">⚡<\u002Fdiv>\n<div><h3 style=\"color:#fff;\">Y la mejor parte: no lo escribes tú.<\u002Fh3><p style=\"color:rgba(255,255,255,0.65);\">La IA ejecuta la fórmula entera en 45 minutos. Tú solo la diriges.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">03<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 04 · LAS 3 FASES -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">El mapa · 04<\u002Fdiv>\n<h2>Tres fases. Como una hoguera.<\u002Fh2>\n<p style=\"margin-bottom:24px;max-width:620px;\">Nadie lanza un fuego de golpe. Primero preparas la leña, luego la enciendes, y al final aprovechas las brasas.<\u002Fp>\n<div class=\"row3\" style=\"margin-bottom:22px;\">\n<div class=\"card\"><div class=\"emoji\">🪵<\u002Fdiv><h4 style=\"margin-top:12px;\">Fase 1 · Días 1–3<\u002Fh4><h3>Preparar<\u002Fh3><p style=\"font-size:14px;\">El calentamiento. Nadie sabe que hay producto.<\u002Fp><\u002Fdiv>\n<div class=\"card\"><div class=\"emoji\">🔥<\u002Fdiv><h4 style=\"margin-top:12px;\">Fase 2 · Días 4–9<\u002Fh4><h3>Encender<\u002Fh3><p style=\"font-size:14px;\">Autoridad, confianza y deseo. Sin vender aún.<\u002Fp><\u002Fdiv>\n<div class=\"cardb\"><div class=\"emoji\">💰<\u002Fdiv><h4 style=\"margin-top:12px;\">Fase 3 · Días 10–14<\u002Fh4><h3>Cerrar<\u002Fh3><p style=\"font-size:14px;\">Se abren las puertas. Cinco días de venta.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"carddark\" style=\"display:flex;gap:18px;align-items:center;\"><div class=\"emojibig\">🤫<\u002Fdiv><div><h3 style=\"color:#fff;\">Por eso es invisible.<\u002Fh3><p style=\"color:rgba(255,255,255,0.65);\">Durante 9 de los 14 días no se vende nada. La audiencia solo ve contenido — pero cada día pulsa un botón.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">04<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 05 · LOS 11 BOTONES -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">La psicología · 05<\u002Fdiv>\n<h2>Los 11 botones de compra.<\u002Fh2>\n<p style=\"margin-bottom:20px;max-width:620px;\">Todos los tenemos en la cabeza. La fórmula los pulsa en orden, uno por día. Marca los que ya reconoces en ti:<\u002Fp>\n<table class=\"tbl\"><thead><tr><th style=\"width:54px;\">Nº<\u002Fth><th>Botón<\u002Fth><th>En una frase<\u002Fth><\u002Ftr><\u002Fthead><tbody>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--blue);\">1<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Inversión<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Si participo, me implico.<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--blue);\">2<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Identificación<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Me siento entendido.<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--blue);\">3<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Comunidad<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">No estoy solo en esto.<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--orange);\">4<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Autoridad<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Esta persona sabe.<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--orange);\">5<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Confianza ⭐<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Es como yo. Me fío.<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--orange);\">6<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Reciprocidad<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Me dio gratis. Le debo.<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--orange);\">7<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Prueba social<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Si hay cola, será bueno.<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--orange);\">8<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Proyección<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Ya me imagino con ello.<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--orange);\">9<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Anticipación<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Mañana pasa algo grande.<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--red);\">10<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">FOMO ⭐<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Otros entran. ¿Y yo?<\u002Ftd><\u002Ftr>\n<tr><td style=\"padding:9px 10px;font-weight:700;color:var(--red);\">11<\u002Ftd><td style=\"padding:9px 10px;font-weight:600;\">Urgencia<\u002Ftd><td style=\"padding:9px 10px;font-size:14px;color:#3a3a3c;\">Se cierra. Es ahora o no.<\u002Ftd><\u002Ftr>\n<\u002Ftbody><\u002Ftable>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">05<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 06 · DOS BOTONES DECISIVOS -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Los decisivos · 06<\u002Fdiv>\n<h2>Dos botones lo deciden todo.<\u002Fh2>\n<p style=\"margin-bottom:24px;max-width:620px;\">El 5 y el 10. Si fallan, la cadena se rompe — y no lo sabes hasta el día 14, cuando llegan los números.<\u002Fp>\n<div class=\"row2\" style=\"margin-bottom:22px;\">\n<div class=\"cardb\"><div class=\"emoji\">🤝<\u002Fdiv><h4 style=\"margin-top:12px;\">Botón 5 · Confianza<\u002Fh4><p style=\"font-size:14.5px;\">El creador baja del escenario y se sienta en la hoguera. Sin confianza, nada de lo que venga después funciona.<\u002Fp><\u002Fdiv>\n<div class=\"cardb\"><div class=\"emoji\">🚪<\u002Fdiv><h4 style=\"margin-top:12px;\">Botón 10 · FOMO<\u002Fh4><p style=\"font-size:14.5px;\">El día de apertura. «Sara acaba de entrar.» Real, verificable — y enciende el miedo a quedarse fuera.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"editbanner\" style=\"margin-bottom:14px;\">✏️ Piensa en tu última compra impulsiva. ¿Qué botones te pulsaron?<\u002Fdiv>\n<div class=\"editbox\" data-ph=\"ej. vi que quedaban 2 plazas (FOMO) y que cerraba esa noche (urgencia)…\"><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">06<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 07 · FASE 1 CAP -->\n<div class=\"page\" style=\"justify-content:center;\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"bignum\">01<\u002Fdiv>\n<div class=\"eyebrow\" style=\"margin-top:18px;\">Fase 1 · Días 1–3<\u002Fdiv>\n<h1 style=\"font-size:56px;max-width:560px;\">El calentamiento.<\u002Fh1>\n<p style=\"font-size:20px;color:var(--gry);margin-top:18px;max-width:520px;\">Nadie sabe que hay producto. El creador solo conversa con su audiencia — y la implica.<\u002Fp>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">07<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 08 · DÍA 1 · INVERSIÓN -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Día 1 · botón 1 · inversión · 08<\u002Fdiv>\n<h2>El creador hace preguntas.<\u002Fh2>\n<p style=\"margin-bottom:20px;max-width:620px;\">No enseña nada todavía. Pregunta a su gente qué les duele. Y al responder, se implican — es el efecto IKEA: valoras más lo que ayudas a montar.<\u002Fp>\n<div class=\"card\" style=\"margin-bottom:20px;\"><h4>Qué se publica<\u002Fh4><p style=\"margin:0;\">Una encuesta en stories: «¿Cuál es tu mayor problema con [tema]?» Caja de respuestas abierta.<\u002Fp><\u002Fdiv>\n<div class=\"editbanner\" style=\"margin-bottom:14px;\">✏️ Escribe la pregunta del día 1 para el producto de tu creador.<\u002Fdiv>\n<h4>Mi encuesta del día 1<\u002Fh4>\n<div class=\"editbox\" data-ph=\"¿Cuál es tu mayor problema con…?\"><\u002Fdiv>\n<div class=\"ex\" style=\"margin-top:16px;\"><div class=\"exhead\"><span class=\"exface\">M<\u002Fspan> El día 1 de Marta<\u002Fdiv><p>«¿Qué es lo que más te cuesta de comer sano? Cuéntamelo, leo todo.» — 412 respuestas en 24 horas.<\u002Fp><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">08<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 09 · DÍA 2 · IDENTIFICACIÓN -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Día 2 · botón 2 · identificación · 09<\u002Fdiv>\n<h2>«Os he leído a todos.»<\u002Fh2>\n<p style=\"margin-bottom:20px;max-width:620px;\">El creador coge las respuestas del día 1 y se las devuelve a su audiencia. Es la sensación más poderosa del marketing: sentirse entendido.<\u002Fp>\n<div class=\"card\" style=\"margin-bottom:20px;\"><h4>Qué se publica<\u002Fh4><p style=\"margin:0;\">«Ayer os pregunté. Esto es lo que me habéis dicho…» — y repite sus palabras exactas, una a una.<\u002Fp><\u002Fdiv>\n<div class=\"editbanner\" style=\"margin-bottom:14px;\">✏️ ¿Qué 3 frases crees que repetiría la audiencia de tu creador?<\u002Fdiv>\n<div style=\"display:flex;gap:14px;align-items:center;margin-bottom:12px;\"><div class=\"numO\" style=\"width:38px;height:38px;font-size:17px;\">1<\u002Fdiv><div class=\"editable\" data-ph=\"«…»\" style=\"flex:1;\"><\u002Fdiv><\u002Fdiv>\n<div style=\"display:flex;gap:14px;align-items:center;margin-bottom:12px;\"><div class=\"numO\" style=\"width:38px;height:38px;font-size:17px;\">2<\u002Fdiv><div class=\"editable\" data-ph=\"«…»\" style=\"flex:1;\"><\u002Fdiv><\u002Fdiv>\n<div style=\"display:flex;gap:14px;align-items:center;\"><div class=\"numO\" style=\"width:38px;height:38px;font-size:17px;\">3<\u002Fdiv><div class=\"editable\" data-ph=\"«…»\" style=\"flex:1;\"><\u002Fdiv><\u002Fdiv>\n<div class=\"ex\" style=\"margin-top:16px;\"><div class=\"exhead\"><span class=\"exface\">M<\u002Fspan> El día 2 de Marta<\u002Fdiv><p>«Me decís: 'empiezo la dieta el lunes y el viernes la dejo'. Os leo y me veo a mí hace 10 años.»<\u002Fp><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">09<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 10 · DÍA 3 · COMUNIDAD -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Día 3 · botón 3 · comunidad · 10<\u002Fdiv>\n<h2>«No estás solo en esto.»<\u002Fh2>\n<p style=\"margin-bottom:20px;max-width:620px;\">Enseña el aluvión de respuestas: capturas, números, comentarios reales. Como ver el partido en el estadio con 50.000 personas en vez de solo en casa: de individuos sueltos, a tribu.<\u002Fp>\n<div class=\"card\" style=\"margin-bottom:20px;\"><h4>Qué se publica<\u002Fh4><p style=\"margin:0;\">«Mirad cuántos somos con esto.» Capturas de respuestas + el número total. La audiencia se ve como grupo.<\u002Fp><\u002Fdiv>\n<div class=\"check\"><div class=\"box\"><\u002Fdiv><p style=\"margin:0;\">Entiendo que en la fase 1 <strong>no se menciona ningún producto<\u002Fstrong>.<\u002Fp><\u002Fdiv>\n<div class=\"check\"><div class=\"box\"><\u002Fdiv><p style=\"margin:0;\">Entiendo que el objetivo es que la audiencia se implique y se sienta grupo.<\u002Fp><\u002Fdiv>\n<div class=\"ex\" style=\"margin-top:16px;\"><div class=\"exhead\"><span class=\"exface\">M<\u002Fspan> El día 3 de Marta<\u002Fdiv><p>«+400 personas me habéis contado lo mismo. No es falta de fuerza de voluntad. Es el método. Y de eso vamos a hablar esta semana.»<\u002Fp><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">10<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 11 · FASE 2 CAP -->\n<div class=\"page\" style=\"justify-content:center;\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"bignum\">02<\u002Fdiv>\n<div class=\"eyebrow\" style=\"margin-top:18px;\">Fase 2 · Días 4–9<\u002Fdiv>\n<h1 style=\"font-size:56px;max-width:560px;\">Encender el deseo.<\u002Fh1>\n<p style=\"font-size:20px;color:var(--gry);margin-top:18px;max-width:520px;\">Seis días de valor, confianza y anticipación. La venta todavía no ha empezado — pero ya está ocurriendo.<\u002Fp>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">11<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 12 · DÍAS 4-5 -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Días 4 y 5 · autoridad y confianza · 12<\u002Fdiv>\n<h2>Primero el médico. Luego el amigo.<\u002Fh2>\n<div class=\"dayrow\"><div class=\"daynum\" style=\"background:var(--orange);\">4<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,159,10,0.12);color:#b06a00;\">Botón 4 · Autoridad<\u002Fspan><h3>El diagnóstico antes que la receta.<\u002Fh3><p style=\"font-size:14.5px;\">Como un buen médico: primero explica qué te pasa y por qué. Solo entonces escuchas la solución. El creador enseña el porqué del problema.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"dayrow\" style=\"border-bottom:none;\"><div class=\"daynum\" style=\"background:var(--orange);\">5<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,159,10,0.12);color:#b06a00;\">Botón 5 · Confianza ⭐ decisivo<\u002Fspan><h3>Baja del escenario. Siéntate en la hoguera.<\u002Fh3><p style=\"font-size:14.5px;\">De la conferencia fría a la conversación de igual a igual. El creador se muestra cercano, con sus fallos. Aquí se gana o se pierde el lanzamiento.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"editbanner\" style=\"margin:18px 0 14px;\">✏️ ¿Qué historia personal podría contar tu creador el día 5?<\u002Fdiv>\n<div class=\"editbox\" data-ph=\"ej. cuando ella misma fracasó con esto, antes de encontrar su método…\"><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">12<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 13 · DÍAS 6-7 -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Días 6 y 7 · reciprocidad y prueba social · 13<\u002Fdiv>\n<h2>Da gratis. Enseña la cola.<\u002Fh2>\n<div class=\"dayrow\"><div class=\"daynum\" style=\"background:var(--orange);\">6<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,159,10,0.12);color:#b06a00;\">Botón 6 · Reciprocidad<\u002Fspan><h3>Un método claro, de 3 a 5 pasos.<\u002Fh3><p style=\"font-size:14.5px;\">Algo accionable que pueden aplicar hoy mismo. Valor real, gratis, por delante. Quien recibe, siente que debe.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"dayrow\" style=\"border-bottom:none;\"><div class=\"daynum\" style=\"background:var(--orange);\">7<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,159,10,0.12);color:#b06a00;\">Botón 7 · Prueba social<\u002Fspan><h3>El restaurante con cola en la puerta.<\u002Fh3><p style=\"font-size:14.5px;\">Dos locales iguales: eliges el que tiene cola. El creador enseña resultados y testimonios de gente como su audiencia.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"editbanner\" style=\"margin:18px 0 14px;\">✏️ El mini-método gratis del día 6: ¿qué 3 pasos regalaría tu creador?<\u002Fdiv>\n<div class=\"editbox\" data-ph=\"1… 2… 3…\"><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">13<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 14 · DÍAS 8-9 -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Días 8 y 9 · proyección y anticipación · 14<\u002Fdiv>\n<h2>Imagina tenerlo. Mañana llega.<\u002Fh2>\n<div class=\"dayrow\"><div class=\"daynum\" style=\"background:var(--orange);\">8<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,159,10,0.12);color:#b06a00;\">Botón 8 · Proyección<\u002Fspan><h3>La primera mención del producto.<\u002Fh3><p style=\"font-size:14.5px;\">«Imagina que mañana tienes el sistema completo.» Les hace sentir cómo es tenerlo. Primera vez que se nombra — día 8 de 14.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"dayrow\" style=\"border-bottom:none;\"><div class=\"daynum\" style=\"background:var(--orange);\">9<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,159,10,0.12);color:#b06a00;\">Botón 9 · Anticipación<\u002Fspan><h3>24 horas antes. Como un concierto.<\u002Fh3><p style=\"font-size:14.5px;\">La banda no aparece y toca: anuncia y genera cuenta atrás. Se resuelve cada duda y se hace imperdible la apertura.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"check\" style=\"margin-top:18px;\"><div class=\"box\"><\u002Fdiv><p style=\"margin:0;\">Entiendo que el producto no se nombra hasta el día 8.<\u002Fp><\u002Fdiv>\n<div class=\"check\"><div class=\"box\"><\u002Fdiv><p style=\"margin:0;\">Entiendo que el día 9 se anuncia día y hora exactos de apertura.<\u002Fp><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">14<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 15 · POR QUÉ STORIES -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">El formato · 15<\u002Fdiv>\n<h2>Todo pasa en stories.<\u002Fh2>\n<p style=\"margin-bottom:24px;max-width:620px;\">El formato más fácil que existe. Nada de vídeos producidos ni anuncios pagados.<\u002Fp>\n<div class=\"row3\" style=\"margin-bottom:22px;\">\n<div class=\"card\"><div class=\"emoji\">📱<\u002Fdiv><h4 style=\"margin-top:12px;\">Ya las hace<\u002Fh4><p style=\"font-size:14px;\">Tu creador publica stories cada día. Cero fricción.<\u002Fp><\u002Fdiv>\n<div class=\"card\"><div class=\"emoji\">👀<\u002Fdiv><h4 style=\"margin-top:12px;\">Las ve su gente<\u002Fh4><p style=\"font-size:14px;\">La audiencia caliente, la que ya confía.<\u002Fp><\u002Fdiv>\n<div class=\"cardb\"><div class=\"emoji\">💬<\u002Fdiv><h4 style=\"margin-top:12px;\">Conversan<\u002Fh4><p style=\"font-size:14px;\">Encuestas, cajas, reacciones: implican.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"carddark\" style=\"display:flex;gap:18px;align-items:center;\"><div class=\"emojibig\">🎬<\u002Fdiv><div><h3 style=\"color:#fff;\">Tu creador solo publica lo que tú le pasas.<\u002Fh3><p style=\"color:rgba(255,255,255,0.65);\">El guion de cada día lo escribe la IA. Él lo graba con su voz. Tú diriges.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">15<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 16 · FASE 3 CAP -->\n<div class=\"page\" style=\"justify-content:center;\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"bignum\">03<\u002Fdiv>\n<div class=\"eyebrow\" style=\"margin-top:18px;\">Fase 3 · Días 10–14<\u002Fdiv>\n<h1 style=\"font-size:56px;max-width:560px;\">Se abren las puertas.<\u002Fh1>\n<p style=\"font-size:20px;color:var(--gry);margin-top:18px;max-width:520px;\">Cinco días de venta. Toda la energía acumulada se convierte en compras.<\u002Fp>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">16<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 17 · DÍAS 10-12 -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Días 10, 11 y 12 · FOMO · 17<\u002Fdiv>\n<h2>Apertura, impulso y objeciones.<\u002Fh2>\n<div class=\"dayrow\"><div class=\"daynum\" style=\"background:var(--red);\">10<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,55,95,0.1);color:var(--red);\">Botón 10 · FOMO ⭐ decisivo<\u002Fspan><h3>Se abren las puertas.<\u002Fh3><p style=\"font-size:14.5px;\">«Sara acaba de entrar. Michael, dentro. Jessica, hace 8 minutos.» Es real — y enciende el pánico de quedarse fuera.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"dayrow\"><div class=\"daynum\" style=\"background:var(--red);\">11<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,55,95,0.1);color:var(--red);\">Botón 10 · FOMO<\u002Fspan><h3>Mantén el impulso.<\u002Fh3><p style=\"font-size:14.5px;\">Avalancha de prueba social. Y un zoom a una sola función: «esto ya vale más que el precio entero».<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"dayrow\" style=\"border-bottom:none;\"><div class=\"daynum\" style=\"background:var(--red);\">12<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,55,95,0.1);color:var(--red);\">Botón 10 · FOMO<\u002Fspan><h3>Demuele las objeciones.<\u002Fh3><p style=\"font-size:14.5px;\">Una FAQ que responde cada excusa de frente. Cada duda sin resolver es una venta que pierdes mañana.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"editbanner\" style=\"margin:18px 0 14px;\">✏️ Escribe 2 objeciones que tendría la audiencia de tu creador.<\u002Fdiv>\n<div class=\"editbox\" data-ph=\"ej. «no tengo tiempo», «ya probé algo así y no funcionó»…\"><\u002Fdiv>\n<div class=\"brand\">Cuaderno · Clase 4<\u002Fdiv><div class=\"pagenum\">17<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 18 · DÍAS 13-14 -->\n<div class=\"page\"><div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"eyebrow\">Días 13 y 14 · urgencia · 18<\u002Fdiv>\n<h2>El aviso. Y la batalla final.<\u002Fh2>\n<div class=\"dayrow\"><div class=\"daynum\" style=\"background:var(--red);\">13<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,55,95,0.1);color:var(--red);\">Botón 11 · Urgencia<\u002Fspan><h3>El disparo de aviso.<\u002Fh3><p style=\"font-size:14.5px;\">«Mañana, a esta hora exacta, se cierra. Sin prórrogas.» Y el plazo es de verdad — o la próxima vez nadie te cree.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"dayrow\" style=\"border-bottom:none;\"><div class=\"daynum\" style=\"background:var(--red);\">14<\u002Fdiv><div style=\"flex:1;\"><span class=\"btnpill\" style=\"background:rgba(255,55,95,0.1);color:var(--red);\">Botón 11 · Urgencia<\u002Fspan><h3>La batalla final. Se cierra el carrito.<\u002Fh3><p style=\"font-size:14.5px;\">El 40–50 % de los indecisos compran en las últimas horas. Cuenta atrás a tope, y cierre en firme.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<div class=\"cardb\" style=\"margin-top:18px;
